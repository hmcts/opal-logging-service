server:
  port: 4065
  shutdown: "graceful"
hmcts:
  common:
    exceptions:
      enable-exception-handler: true
management:
  endpoint:
    health:
      show-details: "always"
      group:
        readiness:
          include: "db"
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info, prometheus

opal:
  logging:
    test-support:
      enabled: ${OPAL_LOGGING_TEST_SUPPORT_ENABLED:false}
    pdpl:
      consumer:
        enabled: ${LOGGING_PDPL_CONSUMER_ENABLED:true}
        connection-string: ${SERVICEBUS_CONNECTION_STRING:Endpoint=sb://localhost/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=local;UseDevelopmentEmulator=true}
        queue-name: ${SERVICEBUS_LOGGING_PDPL_QUEUE_NAME:logging-pdpl}
        protocol: ${SERVICEBUS_LOGGING_PDPL_PROTOCOL:amqp}
        idle-timeout-ms: ${SERVICEBUS_IDLE_TIMEOUT_MS:30000}

springdoc:
  packagesToScan: uk.gov.hmcts.opal.logging.controllers
  writer-with-order-by-keys: true

spring:
  config:
    import: "optional:configtree:/mnt/secrets/opal/"
  application:
    name: Opal Logging Service
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${OPAL_LOGGING_DB_HOST:localhost}:${OPAL_LOGGING_DB_PORT:5432}/${OPAL_LOGGING_DB_NAME:opal-logging-db}${OPAL_LOGGING_DB_OPTIONS:}
    username: ${OPAL_LOGGING_DB_USERNAME:opal-logging}
    password: ${OPAL_LOGGING_DB_PASSWORD:opal-logging}
    properties:
      charSet: UTF-8
    hikari:
      minimumIdle: 2
      maximumPoolSize: 10
      idleTimeout: 10000
      poolName: OpalLoggingHikariCP
      maxLifetime: 7200000
      connectionTimeout: 30000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          lob:
            # silence the 'wall-of-text' - unnecessary exception throw about blob types
            non_contextual_creation: true
        order_inserts: true
  flyway:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/dev}
    baseline-on-migrate: true
    ignoreMigrationPatterns: "*:missing"

dbMigration:
  # When true, the app will run DB migration on startup.
  # Otherwise, it will just check if all migrations have been applied (and fail to start if not).
  runOnStartup: ${RUN_DB_MIGRATION_ON_STARTUP:true}

azure:
  application-insights:
    instrumentation-key: ${opal.AppInsightsInstrumentationKey:00000000-0000-0000-0000-000000000000}

launchdarkly:
  sdk-key: ${LAUNCH_DARKLY_SDK_KEY:}
  offline-mode: ${LAUNCH_DARKLY_OFFLINE_MODE:false}
  env: ${LAUNCH_DARKLY_ENV:default}
  enabled: ${LAUNCH_DARKLY_ENABLED:true}
  default-flag-values:
    release-1a: ${RELEASE_1A_ENABLED:false}
